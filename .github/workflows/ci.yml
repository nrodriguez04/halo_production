name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build shared package
        run: npm run build -w @halo/shared

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build all
        run: npm run build

      - name: Run tests
        run: npm test

  migration-check:
    runs-on: ubuntu-latest
    needs: lint-typecheck-build

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: halo
          POSTGRES_PASSWORD: halo_dev_password
          POSTGRES_DB: halo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://halo:halo_dev_password@localhost:5432/halo_test
        run: cd apps/api && npx prisma migrate deploy
